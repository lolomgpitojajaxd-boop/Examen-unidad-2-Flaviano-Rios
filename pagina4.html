<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 4 - Multimedia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial Black', sans-serif;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            padding: 2rem;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .nav-bar {
            background: rgba(255,255,255,0.9);
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        
        .nav-bar a {
            color: #333;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            background: white;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        .nav-bar a:hover {
            transform: translateY(-3px) rotate(5deg);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 3rem;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            margin-bottom: 2rem;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .media-card {
            background: rgba(255,255,255,0.95);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 4px solid white;
        }
        
        .media-card h2 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }
        
        input[type="color"] {
            width: 100%;
            height: 100px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }
        
        .color-display {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .preview-box {
            width: 100%;
            margin-top: 1rem;
            border-radius: 15px;
            overflow: hidden;
            background: #f0f0f0;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px dashed #ccc;
        }
        
        .preview-box img, .preview-box video, .preview-box audio {
            max-width: 100%;
            max-height: 300px;
        }
        
        input[type="file"] {
            width: 100%;
            padding: 1rem;
            background: #f0f0f0;
            border-radius: 10px;
            border: 2px solid #ddd;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <span style="font-weight: bold; font-size: 1.2rem;">🎨 PÁGINA 4 - MULTIMEDIA</span>
        <div>
            <a href="index.html">🏠 Inicio</a>
            <a href="pagina3.html">← Anterior</a>
            <a href="pagina5.html">Siguiente →</a>
        </div>
    </div>
    
    <div class="container">
        <h1>🎨 ESTUDIO MULTIMEDIA 🎵</h1>
        
        <div class="media-grid">
            <div class="media-card">
                <h2>🎨 Selector de Color</h2>
                <input type="color" id="colorPicker" value="#ff6b6b">
                <div class="color-display" id="colorDisplay" style="background: #ff6b6b;">
                    Color seleccionado: #ff6b6b
                </div>
            </div>
            
            <div class="media-card">
                <h2>🖼️ Cargar Imagen</h2>
                <input type="file" id="imageInput" accept="image/*">
                <div class="preview-box" id="imagePreview">
                    <span style="color: #999;">Vista previa de imagen...</span>
                </div>
            </div>
            
            <div class="media-card">
                <h2>🎵 Cargar Audio</h2>
                <input type="file" id="audioInput" accept="audio/*">
                <div class="preview-box" id="audioPreview" style="flex-direction: column; padding: 2rem;">
                    <span style="color: #999; margin-bottom: 1rem;">Reproductor de audio...</span>
                </div>
            </div>
            
            <div class="media-card">
                <h2>🎬 Cargar Video</h2>
                <input type="file" id="videoInput" accept="video/*">
                <div class="preview-box" id="videoPreview">
                    <span style="color: #999;">Reproductor de video...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Color picker
        document.getElementById('colorPicker').addEventListener('input', function(e) {
            const color = e.target.value;
            const display = document.getElementById('colorDisplay');
            display.style.background = color;
            display.textContent = `Color seleccionado: ${color}`;
        });
        
        // Image loader
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.maxWidth = '100%';
                    img.style.borderRadius = '10px';
                    const preview = document.getElementById('imagePreview');
                    preview.innerHTML = '';
                    preview.appendChild(img);
                    preview.style.border = 'none';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // Audio loader
        document.getElementById('audioInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = url;
                audio.style.width = '100%';
                const preview = document.getElementById('audioPreview');
                preview.innerHTML = '';
                preview.appendChild(audio);
                preview.style.border = 'none';
            }
        });
        
        // Video loader
        document.getElementById('videoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const video = document.createElement('video');
                video.controls = true;
                video.src = url;
                video.style.maxWidth = '100%';
                video.style.borderRadius = '10px';
                const preview = document.getElementById('videoPreview');
                preview.innerHTML = '';
                preview.appendChild(video);
                preview.style.border = 'none';
            }
        });
    </script>
</body>
</html>
