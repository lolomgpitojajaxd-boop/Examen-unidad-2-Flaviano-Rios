<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 3 - Calendario y PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            background: #f5f5dc;
            background-image: 
                radial-gradient(#d4d4aa 1px, transparent 1px),
                radial-gradient(#d4d4aa 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            min-height: 100vh;
            padding: 2rem;
        }
        
        .nav-bar {
            background: #8b4513;
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #f5f5dc;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .nav-bar a {
            color: #f5f5dc;
            text-decoration: none;
            padding: 0.5rem 1rem;
            background: #a0522d;
            border-radius: 5px;
            transition: all 0.3s;
            border: 2px solid #d2691e;
        }
        
        .nav-bar a:hover {
            background: #d2691e;
            transform: translateY(-2px);
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            color: #8b4513;
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            font-size: 2.5rem;
        }
        
        .section {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 3px solid #8b4513;
        }
        
        .calendar-input {
            font-size: 1.2rem;
            padding: 1rem;
            border: 2px solid #8b4513;
            border-radius: 8px;
            width: 100%;
            margin-top: 1rem;
            font-family: inherit;
        }
        
        .pdf-container {
            margin-top: 1rem;
            border: 2px solid #8b4513;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        #pdf-canvas {
            width: 100%;
            max-height: 600px;
        }
        
        .pdf-controls {
            background: #8b4513;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        button {
            background: #d2691e;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        
        button:hover {
            background: #cd853f;
        }
        
        .date-display {
            font-size: 1.5rem;
            color: #8b4513;
            margin-top: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <span style="font-weight: bold; font-size: 1.2rem;">📅 PÁGINA 3 - DOCUMENTOS</span>
        <div>
            <a href="index.html">🏠 Inicio</a>
            <a href="pagina2.html">← Anterior</a>
            <a href="pagina4.html">Siguiente →</a>
        </div>
    </div>
    
    <div class="container">
        <h1>📅 Calendario y Visualizador PDF</h1>
        
        <div class="section">
            <h2 style="color: #8b4513; margin-bottom: 1rem;">📅 Seleccionar Fecha</h2>
            <input type="date" id="dateInput" class="calendar-input">
            <div class="date-display" id="dateDisplay">Ninguna fecha seleccionada</div>
        </div>
        
        <div class="section">
            <h2 style="color: #8b4513; margin-bottom: 1rem;">📄 Visualizador de PDF</h2>
            <input type="file" id="pdfInput" accept=".pdf" style="margin-bottom: 1rem; font-size: 1rem;">
            
            <div class="pdf-container" id="pdfContainer" style="display: none;">
                <div class="pdf-controls">
                    <button onclick="prevPage()">← Anterior</button>
                    <span id="pageNum">Página: 0 / 0</span>
                    <button onclick="nextPage()">Siguiente →</button>
                    <button onclick="zoomIn()">🔍+</button>
                    <button onclick="zoomOut()">🔍-</button>
                </div>
                <canvas id="pdf-canvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Configurar PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let pdfDoc = null;
        let pageNum = 1;
        let scale = 1.5;
        let canvas = document.getElementById('pdf-canvas');
        let ctx = canvas.getContext('2d');
        
        document.getElementById('dateInput').addEventListener('change', function(e) {
            const date = e.target.value;
            document.getElementById('dateDisplay').textContent = 
                date ? `Fecha seleccionada: ${new Date(date).toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}` : 'Ninguna fecha seleccionada';
        });
        
        document.getElementById('pdfInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const fileReader = new FileReader();
                fileReader.onload = function() {
                    const typedarray = new Uint8Array(this.result);
                    loadPDF(typedarray);
                };
                fileReader.readAsArrayBuffer(file);
            }
        });
        
        function loadPDF(data) {
            pdfjsLib.getDocument({data: data}).promise.then(function(pdf) {
                pdfDoc = pdf;
                document.getElementById('pdfContainer').style.display = 'block';
                document.getElementById('pageNum').textContent = `Página: 1 / ${pdf.numPages}`;
                renderPage(pageNum);
            });
        }
        
        function renderPage(num) {
            pdfDoc.getPage(num).then(function(page) {
                const viewport = page.getViewport({scale: scale});
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                page.render(renderContext);
            });
            document.getElementById('pageNum').textContent = `Página: ${num} / ${pdfDoc.numPages}`;
        }
        
        function prevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            renderPage(pageNum);
        }
        
        function nextPage() {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            renderPage(pageNum);
        }
        
        function zoomIn() {
            scale += 0.2;
            renderPage(pageNum);
        }
        
        function zoomOut() {
            if (scale <= 0.4) return;
            scale -= 0.2;
            renderPage(pageNum);
        }
    </script>
</body>
</html>
